<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ASA — Algorithmic Strategy Advisor</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap');
:root{--bg:#090909;--s1:#101010;--s2:#181818;--b1:rgba(255,255,255,0.07);--txt:#f0f0f0;--m1:#555;--m2:#888;--green:#00d68f;--red:#ff4d4d;--gd:rgba(0,214,143,0.1);--gb:rgba(0,214,143,0.22);--purple:#8b7fff;--mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;--nav-h:56px;--bot-h:60px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--txt);font-family:var(--sans);font-size:14px}
.topbar{position:fixed;top:0;left:0;right:0;height:var(--nav-h);z-index:200;display:flex;align-items:center;gap:10px;padding:0 16px;background:var(--s1);border-bottom:1px solid var(--b1)}
.logo{font-family:var(--mono);font-size:16px;font-weight:600;letter-spacing:.1em}
.logo em{color:var(--green);font-style:normal}
.ticker-bar{position:fixed;top:var(--nav-h);left:0;right:0;height:36px;z-index:190;display:flex;gap:4px;padding:0 12px;background:var(--s1);border-bottom:1px solid var(--b1);align-items:center;overflow-x:auto}
.ticker-bar::-webkit-scrollbar{display:none}
.tc{display:flex;align-items:center;gap:5px;padding:4px 8px;border-radius:5px;white-space:nowrap;flex-shrink:0;background:var(--s2)}
.tc .s{font-family:var(--mono);font-size:9px;color:var(--m2)}
.tc .v{font-family:var(--mono);font-size:10px;font-weight:600}
.tc .c{font-family:var(--mono);font-size:9px}
.bot-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--bot-h);z-index:200;background:var(--s1);border-top:1px solid var(--b1);grid-template-columns:repeat(5,1fr)}
.bot-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;color:var(--m2);cursor:pointer;font-family:var(--sans);font-size:9px;padding:6px 0;transition:color .15s}
.bot-btn.active{color:var(--green)}
.layout{display:grid;grid-template-columns:200px 1fr;position:fixed;top:calc(var(--nav-h) + 36px);bottom:0;left:0;right:0}
.sidebar{background:var(--s1);border-right:1px solid var(--b1);overflow-y:auto;padding:14px 0}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 16px;cursor:pointer;font-size:12px;color:var(--m2)}
.nav-item.active{color:var(--green);background:var(--gd)}
.main{overflow-y:auto;padding:16px}
.page{display:none}.page.active{display:block}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:14px;margin-bottom:12px}
.h-row{display:grid;padding:10px 14px;border-bottom:1px solid var(--b1);align-items:center}
.mn{font-family:var(--mono)}
.g{color:var(--green)}.r{color:var(--red)}
@media(max-width:768px){.sidebar{display:none}.layout{grid-template-columns:1fr;bottom:var(--bot-h)}.bot-nav{display:grid}}
</style>
</head>
<body>

<div class="topbar"><div class="logo">A<em>S</em>A</div><div class="topbar-right" style="margin-left:auto;font-family:var(--mono);font-size:11px" id="clk">--:--:--</div></div>
<div class="ticker-bar">
  <div class="tc"><span class="s">NVDA</span><span class="v">$0.00</span><span class="c">--</span></div>
  <div class="tc"><span class="s">MSFT</span><span class="v">$0.00</span><span class="c">--</span></div>
  <div class="tc"><span class="s">TSM</span><span class="v">$0.00</span><span class="c">--</span></div>
  <div class="tc"><span class="s">BTC</span><span class="v">$0.00</span><span class="c">--</span></div>
</div>

<div class="layout">
  <nav class="sidebar">
    <div class="nav-item active" onclick="go('market',this)">Market</div>
    <div class="nav-item" onclick="go('builder',this)">Portfolio</div>
  </nav>
  <div class="main">
    <div id="page-market" class="page active"><div class="card"><h2>Market Overview</h2><p>Real-time Dashboard</p></div></div>
    
    <div id="page-builder" class="page">
      <div class="card">
        <h2>Portfolio</h2>
        <div style="margin:10px 0;">
          <select id="portSelector" class="pi" onchange="switchPortfolio()"></select>
          <input id="newPortName" type="text" placeholder="ชื่อพอร์ตใหม่" class="pi">
          <button onclick="createPortfolio()">+ สร้าง</button>
        </div>
        <div style="margin:10px 0;">
          <input id="portTicker" type="text" placeholder="Ticker">
          <input id="portAmount" type="number" placeholder="จำนวน">
          <button onclick="addAsset()">+ เพิ่ม</button>
        </div>
        <div id="pbRows"></div>
        <h3 id="pbTotalVal">Total: 0</h3>
      </div>
    </div>
  </div>
</div>

<nav class="bot-nav">
  <button class="bot-btn active" onclick="goMob('market',this)">Market</button>
  <button class="bot-btn" onclick="goMob('builder',this)">Portfolio</button>
</nav>

<script>
// --- UI Navigation ---
function go(id,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
}
function goMob(id,el){ go(id,el); }

// --- Portfolio Logic ---
let portfolios = JSON.parse(localStorage.getItem('asa_portfolios')) || [{name: 'Main', assets: []}];
let activeIdx = 0;

function createPortfolio() {
  const name = document.getElementById('newPortName').value;
  if(!name) return;
  portfolios.push({name, assets: []});
  activeIdx = portfolios.length - 1;
  renderPortfolio();
}

function addAsset() {
  const sym = document.getElementById('portTicker').value.toUpperCase();
  const amt = parseFloat(document.getElementById('portAmount').value);
  if(!sym || isNaN(amt)) return;
  portfolios[activeIdx].assets.push({sym, amt, costPrice: 0});
  renderPortfolio();
}

function updateCost(idx, val) {
  portfolios[activeIdx].assets[idx].costPrice = parseFloat(val);
  renderPortfolio();
}

function renderPortfolio() {
  const p = portfolios[activeIdx];
  document.getElementById('pbRows').innerHTML = p.assets.map((a,i) => `
    <div class="h-row" style="grid-template-columns: 80px 1fr 80px 100px 60px;">
      <div class="sym">${a.sym}</div>
      <div>${a.amt}</div>
      <div><input type="number" value="${a.costPrice}" onchange="updateCost(${i}, this.value)" style="width:60px;"></div>
      <div class="mn" id="price-${a.sym}">$0.00</div>
      <button onclick="portfolios[activeIdx].assets.splice(${i},1);renderPortfolio()">×</button>
    </div>`).join('');
  localStorage.setItem('asa_portfolios', JSON.stringify(portfolios));
}

// --- API SYNC ---
async function fetchPrices() {
  const apiKey = 'YOUR_FINNHUB_KEY'; // <--- ใส่ Key ของคุณที่นี่
  const symbols = ['NVDA', 'MSFT', 'TSM', 'BTC']; 
  
  for(let sym of symbols) {
    try {
      const res = await fetch(`https://finnhub.io/api/v1/quote?symbol=${sym}&token=${apiKey}`);
      const data = await res.json();
      if(data.c) {
        document.querySelectorAll(`[id="price-${sym}"]`).forEach(el => el.textContent = '$' + data.c.toFixed(2));
        document.querySelectorAll(`.tc`).forEach(el => {
           if(el.querySelector('.s').textContent === sym) el.querySelector('.v').textContent = '$' + data.c.toFixed(2);
        });
      }
    } catch(e) {}
  }
}
setInterval(fetchPrices, 60000);
fetchPrices();
renderPortfolio();
</script>
</body>
</html>
